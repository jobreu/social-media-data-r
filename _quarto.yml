project:
  type: book
  output-dir: docs
  render:
    - "*.qmd"
    - "!slides/" # Tells the book compiler to ignore this folder

book:
  title: "Collecting and Analyzing Social Media Data with R"
  author: "Johannes Breuer"
  date: "15.4.2026"
  chapters:
    - index.qmd
    - intro.qmd
    - summary.qmd
    - references.qmd

bibliography: references.bib

format:
  html:
    theme:
      - cosmo
      - brand
  pdf:
    documentclass: scrreprt



